<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Primer — OSSIF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --user-bg: #1f6feb;
    --error: #f85149;
    --success: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  header .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-dim);
    color: var(--accent);
  }

  header .spacer { flex: 1; }

  header button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  header button:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 24px;
    text-align: center;
    padding: 40px 20px;
  }

  #welcome h2 {
    font-size: 28px;
    font-weight: 600;
  }

  #welcome p {
    color: var(--text-muted);
    max-width: 500px;
    line-height: 1.6;
  }

  .starters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 600px;
  }

  .starters button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.15s;
  }

  .starters button:hover {
    border-color: var(--accent);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .message.user { justify-content: flex-end; }

  .message .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }

  .message.assistant .avatar {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .message.user .avatar { display: none; }

  .message .content {
    padding: 10px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
    max-width: 85%;
  }

  .message.user .content {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Markdown inside messages */
  .message .content p { margin-bottom: 8px; }
  .message .content p:last-child { margin-bottom: 0; }
  .message .content ul, .message .content ol { margin: 8px 0; padding-left: 20px; }
  .message .content li { margin-bottom: 4px; }
  .message .content h1, .message .content h2, .message .content h3 {
    margin: 12px 0 6px;
    font-size: 16px;
  }
  .message .content code {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .message .content pre {
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .message .content pre code {
    background: none;
    padding: 0;
  }
  .message .content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-muted);
    margin: 8px 0;
  }
  .message .content strong { color: #fff; }
  .message .content a { color: var(--accent); }

  /* Streaming indicator */
  .streaming .content::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 16px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Error message */
  .error-banner {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--error);
    color: var(--error);
    padding: 10px 16px;
    border-radius: 8px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }

  .error-banner button {
    background: none;
    border: 1px solid var(--error);
    color: var(--error);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: auto;
    font-size: 13px;
  }

  /* Input area */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
  }

  #input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #message-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 200px;
    line-height: 1.5;
    outline: none;
  }

  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn svg { width: 20px; height: 20px; }

  footer {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>The Primer</h1>
  <span class="tag">OSSIF</span>
  <div class="spacer"></div>
  <button onclick="resetChat()">New Chat</button>
</header>

<div id="chat-container">
  <div id="welcome">
    <h2>Hello.</h2>
    <p>I'm the Primer, an adaptive reasoning companion from the Open Source Sapient Interaction Framework. I'm here to think alongside you about whatever you want to explore.</p>
    <div class="starters">
      <button onclick="sendStarter(this)">What is OSSIF?</button>
      <button onclick="sendStarter(this)">How do I evaluate a news source?</button>
      <button onclick="sendStarter(this)">What are the Seven Imperatives?</button>
      <button onclick="sendStarter(this)">Help me think through a tough decision</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrapper">
    <textarea id="message-input" rows="1" placeholder="Ask anything..." autofocus></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<footer>
  Powered by <a href="https://ossif.711bf.org" target="_blank">OSSIF</a> — Open Source Sapient Interaction Framework
</footer>

<script>
const chatContainer = document.getElementById('chat-container');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');

let messages = [];
let isStreaming = false;

// Configure marked
marked.setOptions({
  breaks: true,
  gfm: true
});

// Auto-resize textarea
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
});

// Enter to send, Shift+Enter for newline
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendStarter(btn) {
  messageInput.value = btn.textContent;
  sendMessage();
}

function resetChat() {
  messages = [];
  chatContainer.innerHTML = `
    <div id="welcome">
      <h2>Hello.</h2>
      <p>I'm the Primer, an adaptive reasoning companion from the Open Source Sapient Interaction Framework. I'm here to think alongside you about whatever you want to explore.</p>
      <div class="starters">
        <button onclick="sendStarter(this)">What is OSSIF?</button>
        <button onclick="sendStarter(this)">How do I evaluate a news source?</button>
        <button onclick="sendStarter(this)">What are the Seven Imperatives?</button>
        <button onclick="sendStarter(this)">Help me think through a tough decision</button>
      </div>
    </div>`;
  messageInput.focus();
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  if (role === 'assistant') {
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'P';
    div.appendChild(avatar);
  }

  const content = document.createElement('div');
  content.className = 'content';

  if (role === 'user') {
    content.textContent = text;
  } else {
    content.innerHTML = DOMPurify.sanitize(marked.parse(text));
  }

  div.appendChild(content);
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error-banner';

  const span = document.createElement('span');
  span.textContent = msg;
  div.appendChild(span);

  const btn = document.createElement('button');
  btn.textContent = 'Retry';
  btn.addEventListener('click', () => {
    div.remove();
    sendMessage(true);
  });
  div.appendChild(btn);

  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage(retry = false) {
  if (isStreaming) return;

  const text = retry ? messages[messages.length - 1].content : messageInput.value.trim();
  if (!text) return;

  if (!retry) {
    messages.push({ role: 'user', content: text });
    addMessage('user', text);
    messageInput.value = '';
    messageInput.style.height = 'auto';
  }

  isStreaming = true;
  sendBtn.disabled = true;

  const assistantDiv = addMessage('assistant', '');
  assistantDiv.classList.add('streaming');
  const contentEl = assistantDiv.querySelector('.content');
  let fullText = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    if (!response.ok) {
      throw new Error(`Server error: ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              fullText += data.text;
              contentEl.innerHTML = DOMPurify.sanitize(marked.parse(fullText));
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          } catch (e) {
            // skip malformed JSON (e.g. done event)
          }
        }
      }
    }

    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    assistantDiv.remove();
    showError(err.message || 'Failed to connect. Is the server running?');
  } finally {
    assistantDiv.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    messageInput.focus();
  }
}
</script>

</body>
</html>
